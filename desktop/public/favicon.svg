  <!-- Top glassy reflection overlay -->
  <path d="M 2 10 C 2 6, 6 2, 10 2 L 22 2 C 26 2, 30 6, 30 10 C 25 10, 7 10, 2 10 Z" fill="url(#glowGrad)" />
